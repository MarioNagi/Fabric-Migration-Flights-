name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sql-tests:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Test_Password_123!
          MSSQL_PID: Developer
        ports: ['1433:1433']
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Test_Password_123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install sqlcmd
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            sqlcmd -S localhost -U sa -P "Test_Password_123!" -C -Q "SELECT 1" && break
            sleep 2
          done

      - name: Build schema
        run: |
          for f in sql_onprem/01_*.sql sql_onprem/02_*.sql sql_onprem/03_*.sql; do
            sqlcmd -S localhost -U sa -P "Test_Password_123!" -C -i "$f" -b
          done

      - name: Wire observability
        run: |
          for f in sql_onprem/20_*.sql sql_onprem/21_*.sql sql_onprem/22_*.sql; do
            sqlcmd -S localhost -U sa -P "Test_Password_123!" -C -i "$f" -b
          done

      - name: Load dimensions (no fact — staging is empty in CI)
        run: |
          sqlcmd -S localhost -U sa -P "Test_Password_123!" -C -i sql_onprem/04_load_dimensions.sql -b

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
        continue-on-error: true
